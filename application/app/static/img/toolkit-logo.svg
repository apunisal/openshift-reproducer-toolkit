<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Toolkit tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="96" y2="96">
      <stop offset="0%" stop-color="#fffaf7"/>
      <stop offset="100%" stop-color="#ffefe3"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b7c8f"/>
      <stop offset="100%" stop-color="#3a4a58"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="22" fill="url(#bg)"/>
  <rect x="3" y="3" width="90" height="90" rx="19" fill="none" stroke="rgba(180,90,50,0.2)" stroke-width="1.5"/>

  <!-- Panha / open-end wrench -->
  <g transform="translate(6, 14) rotate(-30 18 30)">
    <path fill="url(#steel)" d="M26 4 L34 12 L20 26 C22 28 23 31 23 34 C23 40 18 45 12 45 C6 45 1 40 1 34 C1 28 6 23 12 23 C15 23 18 24 20 26 L26 20 L18 12 Z"/>
    <ellipse cx="12" cy="34" rx="5" ry="5" fill="#2d3a45"/>
  </g>

  <!-- Screwdriver (flat head) -->
  <g transform="translate(40, 10)">
    <rect x="8" y="50" width="10" height="26" rx="4" fill="#c45c26"/>
    <rect x="9" y="44" width="8" height="8" rx="2" fill="#333"/>
    <rect x="11" y="12" width="4" height="34" rx="1.5" fill="url(#steel)"/>
    <rect x="8" y="6" width="10" height="4" rx="1" fill="url(#steel)"/>
  </g>

  <!-- Pakkad / pliers -->
  <g transform="translate(48, 22) rotate(15 24 28)">
    <!-- handles -->
    <path fill="#c45c26" d="M4 48 Q2 58 6 66 L14 64 Q10 56 12 48 Z"/>
    <path fill="#c45c26" d="M44 48 Q46 58 42 66 L34 64 Q38 56 36 48 Z"/>
    <!-- jaws -->
    <path fill="url(#steel)" d="M12 48 L20 20 L24 22 L16 50 Z"/>
    <path fill="url(#steel)" d="M36 48 L28 20 L24 22 L32 50 Z"/>
    <circle cx="24" cy="24" r="4" fill="#2d3a45"/>
    <path fill="url(#steel)" d="M20 12 L24 8 L28 12 L26 18 L22 18 Z"/>
  </g>

  <!-- Small Phillips screwdriver -->
  <g transform="translate(68, 56) rotate(50 6 14)">
    <rect x="2" y="14" width="8" height="16" rx="2.5" fill="#ee0000"/>
    <rect x="4" y="4" width="4" height="12" fill="url(#steel)"/>
    <path d="M6 2 L8 6 L4 6 Z" fill="url(#steel)"/>
  </g>
</svg>
